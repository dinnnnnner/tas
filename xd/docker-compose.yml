services:
  postgres:
    image: postgres:16
    container_name: demo2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: demo2
    ports:
      - "5432:5432"
    volumes:
      - demo2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo2"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  demo2_pg_data:
